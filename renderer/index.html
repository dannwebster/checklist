<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="sidebar-title">Checklists</span>
      </div>
      <div id="checklist-list"></div>
      <div id="sidebar-footer">
        <button id="btn-folder" title="Add a checklists folder">Add folder</button>
      </div>
    </aside>

    <div id="sidebar-resize-handle"></div>

    <main id="editor">
      <div id="editor-content">
        <div id="title-row">
          <h1 id="editor-title" contenteditable="true" spellcheck="false"></h1>
        </div>
        <ul id="item-list"></ul>
        <div id="add-item-row">
          <input id="add-item-input" type="text" placeholder="Add an item..." autocomplete="off">
        </div>
      </div>
    </main>
  </div>

  <script src="parser.js"></script>
  <script src="sidebar.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>
</body>
</html>
