<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="#0D2B45"/>

  <!-- Punchcard body (cream/parchment) with top-right corner notch -->
  <path d="M 88 108 L 400 108 L 436 144 L 436 392 Q 436 404 424 404 L 88 404 Q 76 404 76 392 L 76 120 Q 76 108 88 108 Z" fill="#F7EDD0"/>

  <!-- Corner notch fold shadow -->
  <path d="M 400 108 L 436 144 L 400 144 Z" fill="#C8B88A"/>

  <!-- Sprocket holes along top of card (7 small rectangles) -->
  <rect x="102" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>
  <rect x="142" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>
  <rect x="182" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>
  <rect x="222" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>
  <rect x="262" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>
  <rect x="302" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>
  <rect x="342" y="118" width="20" height="13" rx="3" fill="#0D2B45"/>

  <!-- Row 1: all 3 checked (y=192) -->
  <circle cx="148" cy="192" r="30" fill="#0D2B45"/>
  <polyline points="132,192 144,206 166,174" fill="none" stroke="#F7EDD0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="256" cy="192" r="30" fill="#0D2B45"/>
  <polyline points="240,192 252,206 274,174" fill="none" stroke="#F7EDD0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="364" cy="192" r="30" fill="#0D2B45"/>
  <polyline points="348,192 360,206 382,174" fill="none" stroke="#F7EDD0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 2: 2 checked, 1 unchecked (y=280) -->
  <circle cx="148" cy="280" r="30" fill="#0D2B45"/>
  <polyline points="132,280 144,294 166,262" fill="none" stroke="#F7EDD0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="256" cy="280" r="30" fill="#0D2B45"/>
  <polyline points="240,280 252,294 274,262" fill="none" stroke="#F7EDD0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="364" cy="280" r="30" fill="none" stroke="#B0A080" stroke-width="5"/>

  <!-- Row 3: 1 checked, 2 unchecked (y=368) -->
  <circle cx="148" cy="368" r="30" fill="#0D2B45"/>
  <polyline points="132,368 144,382 166,350" fill="none" stroke="#F7EDD0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="256" cy="368" r="30" fill="none" stroke="#B0A080" stroke-width="5"/>
  <circle cx="364" cy="368" r="30" fill="none" stroke="#B0A080" stroke-width="5"/>

</svg>
